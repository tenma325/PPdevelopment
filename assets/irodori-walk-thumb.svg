<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="彩り歩き — 白黒の街に虹色の散歩軌跡が描かれるサムネイル">
  <defs>
    <linearGradient id="iw-rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6f91"/>
      <stop offset=".2" stop-color="#ffb347"/>
      <stop offset=".4" stop-color="#f2c94c"/>
      <stop offset=".6" stop-color="#3cc6a6"/>
      <stop offset=".8" stop-color="#4f9df7"/>
      <stop offset="1" stop-color="#a06ce4"/>
    </linearGradient>
  </defs>

  <!-- 白黒の街 -->
  <rect width="640" height="400" fill="#f2f2f2"/>
  <g stroke="#e3e3e3" stroke-width="2">
    <path d="M0 60H640M0 130H640M0 200H640M0 270H640M0 340H640"/>
    <path d="M70 0V400M150 0V400M230 0V400M310 0V400M390 0V400M470 0V400M550 0V400"/>
  </g>
  <g stroke="#d6d6d6" stroke-width="10" stroke-linecap="round">
    <path d="M0 200 H640"/>
    <path d="M310 0 V400"/>
  </g>
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round">
    <path d="M0 200 H640"/>
    <path d="M310 0 V400"/>
  </g>
  <!-- 公園と水辺(灰色の世界) -->
  <rect x="472" y="62" width="76" height="66" rx="8" fill="#e9e9e9"/>
  <rect x="72" y="272" width="76" height="66" rx="8" fill="#dcdcdc"/>

  <!-- 歩いた道 = 虹の軌跡(描かれ続けるループ) -->
  <path id="iw-trail" d="M70 340 L150 340 L150 270 L230 270 L230 200 L390 200 L390 130 L470 130 L470 60 L550 60"
    fill="none" stroke="url(#iw-rainbow)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="980" stroke-dashoffset="980">
    <animate attributeName="stroke-dashoffset" values="980;0;0" keyTimes="0;.7;1" dur="6s" repeatCount="indefinite"/>
  </path>

  <!-- 現在地ドット -->
  <circle cx="550" cy="60" r="16" fill="#4f9df7" opacity=".22">
    <animate attributeName="r" values="12;20;12" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="60" r="8" fill="#4f9df7" stroke="#ffffff" stroke-width="3"/>

  <!-- インクの飛沫 -->
  <circle cx="180" cy="95" r="9" fill="#ffb347" opacity=".85"/>
  <circle cx="205" cy="112" r="4" fill="#ff6f91" opacity=".8"/>
  <circle cx="430" cy="305" r="11" fill="#a06ce4" opacity=".75"/>
  <circle cx="455" cy="288" r="5" fill="#3cc6a6" opacity=".85"/>

  <!-- コンセプト -->
  <text x="24" y="382" font-family="'Zen Kaku Gothic New','Hiragino Sans',sans-serif"
    font-size="21" font-weight="700" fill="#1f1b16">あなたの歩みで世界に彩りを</text>
</svg>
